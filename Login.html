<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta - Anime Destiny</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/destiny-navbar.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body.login-page {
            display: flex;
            flex-direction: column;
        }

        .login-shell {
            width: min(1040px, calc(100% - 32px));
            min-height: calc(100vh - 118px);
            margin: 22px auto 0;
            display: grid;
            grid-template-columns: minmax(0, 0.9fr) minmax(320px, 440px);
            gap: 28px;
            align-items: center;
        }

        .login-copy {
            padding: 28px 0;
        }

        .login-kicker,
        .login-title,
        .login-panel h1,
        .login-tab,
        .login-btn {
            font-family: "Orbitron", sans-serif;
        }

        .login-kicker {
            margin: 0 0 10px;
            color: var(--accent-cyan);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 0.82rem;
        }

        .login-title {
            margin: 0;
            font-size: clamp(2.2rem, 6vw, 4.8rem);
            line-height: 0.98;
            color: #fff;
            text-shadow: 0 0 28px rgba(0, 242, 255, 0.2);
        }

        .login-text {
            max-width: 560px;
            margin: 18px 0 0;
            color: rgba(255, 255, 255, 0.82);
            font-size: 1.12rem;
        }

        .login-panel {
            padding: 22px;
            border-radius: 8px;
            border: 1px solid rgba(0, 242, 255, 0.24);
            background: rgba(6, 8, 18, 0.88);
            box-shadow: 0 22px 54px rgba(0, 0, 0, 0.36), 0 0 34px rgba(188, 19, 254, 0.14);
            backdrop-filter: blur(12px);
        }

        .login-panel h1 {
            margin: 0 0 14px;
            color: var(--accent-cyan);
            font-size: 1.45rem;
            letter-spacing: 0.04em;
        }

        .login-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .login-tab {
            min-height: 42px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.06);
            color: white;
            cursor: pointer;
            letter-spacing: 0.02em;
        }

        .login-tab.is-active {
            border-color: rgba(0, 242, 255, 0.55);
            background: rgba(0, 242, 255, 0.12);
            box-shadow: 0 0 18px rgba(0, 242, 255, 0.12);
        }

        .login-field {
            display: grid;
            gap: 6px;
            margin: 12px 0;
        }

        .login-field.is-hidden {
            display: none;
        }

        .login-field label {
            color: rgba(255, 255, 255, 0.86);
        }

        .login-field input {
            min-height: 44px;
            padding: 0 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            outline: none;
        }

        .login-field input:focus {
            border-color: rgba(0, 242, 255, 0.55);
            box-shadow: 0 0 0 3px rgba(0, 242, 255, 0.12);
        }

        .login-status {
            min-height: 22px;
            margin: 12px 0;
            color: rgba(255, 255, 255, 0.82);
        }

        .login-actions {
            display: grid;
            gap: 10px;
        }

        .login-btn {
            min-height: 46px;
            border-radius: 8px;
            border: 1px solid rgba(188, 19, 254, 0.38);
            background: rgba(188, 19, 254, 0.16);
            color: white;
            cursor: pointer;
            letter-spacing: 0.02em;
        }

        .login-btn.primary {
            border-color: rgba(0, 242, 255, 0.5);
            background: linear-gradient(180deg, rgba(0, 242, 255, 0.24), rgba(188, 19, 254, 0.18));
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 18px rgba(0, 242, 255, 0.12);
        }

        .login-links {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 14px;
        }

        .login-links a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        @media (max-width: 820px) {
            .login-shell {
                grid-template-columns: 1fr;
                align-items: start;
            }

            .login-copy {
                padding: 16px 0 0;
            }
        }
    </style>
</head>
<body class="login-page" data-page="login">
    <nav class="navbar">
        <a href="index.html" class="nav-btn">Inicio</a>
        <a href="manga.html" class="nav-btn">Manga</a>
        <a href="anime.html" class="nav-btn">Anime</a>
        <a href="novelas.html" class="nav-btn">Novelas</a>
        <a href="mis-listas.html" class="nav-btn">Mis listas</a>
    </nav>

    <main class="login-shell">
        <section class="login-copy" aria-label="Anime Destiny">
            <p class="login-kicker">Tu cuenta</p>
            <h1 class="login-title">Anime Destiny</h1>
            <p class="login-text">Entrá para guardar favoritos, progreso y listas en tu perfil.</p>
        </section>

        <section class="login-panel" aria-label="Formulario de cuenta">
            <h1 id="loginTitle">Iniciar sesion</h1>
            <div class="login-tabs" role="group" aria-label="Modo de cuenta">
                <button class="login-tab is-active" id="tabLogin" type="button">Iniciar</button>
                <button class="login-tab" id="tabRegister" type="button">Crear cuenta</button>
            </div>

            <form id="loginForm">
                <div class="login-field is-hidden" id="usernameField">
                    <label for="usernameInput">Usuario</label>
                    <input id="usernameInput" type="text" autocomplete="nickname" placeholder="Ej: NarutoFan">
                </div>

                <div class="login-field">
                    <label for="emailInput">Correo</label>
                    <input id="emailInput" type="email" autocomplete="email" placeholder="tuusuario@gmail.com" required>
                </div>

                <div class="login-field">
                    <label for="passwordInput">Contrasena</label>
                    <input id="passwordInput" type="password" autocomplete="current-password" placeholder="********" required>
                </div>

                <p class="login-status" id="loginStatus" aria-live="polite"></p>

                <div class="login-actions">
                    <button class="login-btn primary" id="submitBtn" type="submit">Entrar</button>
                    <button class="login-btn" id="googleBtn" type="button">Continuar con Google</button>
                    <button class="login-btn" id="logoutBtn" type="button">Cerrar sesion</button>
                </div>
            </form>

            <div class="login-links">
                <a href="index.html">Volver al inicio</a>
                <a href="mis-listas.html">Ver mis listas</a>
            </div>
        </section>
    </main>

    <script src="js/core/config.js" defer></script>
    <script src="js/libs/supabase.js"></script>
    <script src="api/supabase-config.js"></script>
    <script src="js/core/auth.js" defer></script>
    <script>
        (function () {
            "use strict";

            const form = document.getElementById("loginForm");
            const title = document.getElementById("loginTitle");
            const tabLogin = document.getElementById("tabLogin");
            const tabRegister = document.getElementById("tabRegister");
            const usernameField = document.getElementById("usernameField");
            const usernameInput = document.getElementById("usernameInput");
            const emailInput = document.getElementById("emailInput");
            const passwordInput = document.getElementById("passwordInput");
            const submitBtn = document.getElementById("submitBtn");
            const googleBtn = document.getElementById("googleBtn");
            const logoutBtn = document.getElementById("logoutBtn");
            const status = document.getElementById("loginStatus");
            let mode = "login";

            function setStatus(message) {
                status.textContent = message || "";
            }

            function setMode(nextMode) {
                mode = nextMode;
                const isRegister = mode === "register";
                tabLogin.classList.toggle("is-active", !isRegister);
                tabRegister.classList.toggle("is-active", isRegister);
                usernameField.classList.toggle("is-hidden", !isRegister);
                usernameInput.required = isRegister;
                passwordInput.autocomplete = isRegister ? "new-password" : "current-password";
                title.textContent = isRegister ? "Crear cuenta" : "Iniciar sesion";
                submitBtn.textContent = isRegister ? "Crear cuenta" : "Entrar";
                setStatus("");
            }

            async function getClient() {
                if (window.AppSupabase) return window.AppSupabase;
                if (window.AppSupabaseReady) return window.AppSupabaseReady;
                return null;
            }

            function saveLocalUser(user, fallbackName) {
                if (!user && !fallbackName) return;
                if (typeof window.refreshUserUi === "function") window.refreshUserUi();
            }

            function goHomeSoon() {
                window.setTimeout(() => {
                    window.location.href = "index.html";
                }, 700);
            }

            tabLogin.addEventListener("click", () => setMode("login"));
            tabRegister.addEventListener("click", () => setMode("register"));

            form.addEventListener("submit", async (event) => {
                event.preventDefault();
                const client = await getClient();
                if (!client) {
                    setStatus("No se pudo conectar con Supabase. Recarga la pagina.");
                    return;
                }

                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const username = usernameInput.value.trim();

                if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    setStatus("Ingresa un correo valido.");
                    return;
                }
                if (password.length < 6) {
                    setStatus("La contrasena debe tener al menos 6 caracteres.");
                    return;
                }
                if (mode === "register" && username.length < 3) {
                    setStatus("El usuario debe tener al menos 3 caracteres.");
                    return;
                }

                submitBtn.disabled = true;
                setStatus(mode === "register" ? "Creando cuenta..." : "Iniciando sesion...");

                try {
                    if (mode === "register") {
                        const data = await client.signUpWithEmail(email, password, username);
                        saveLocalUser(data?.user, username);
                        if (data?.session) {
                            setStatus("Cuenta creada. Entrando...");
                            goHomeSoon();
                        } else {
                            setStatus("Cuenta creada. Revisa tu correo para confirmarla.");
                        }
                    } else {
                        const data = await client.signInWithEmail(email, password);
                        saveLocalUser(data?.user, email.split("@")[0]);
                        setStatus("Sesion iniciada.");
                        goHomeSoon();
                    }
                } catch (error) {
                    const message = String(error?.message || "");
                    if (message.toLowerCase().includes("invalid login")) {
                        setStatus("Correo o contrasena incorrectos.");
                    } else if (message.toLowerCase().includes("email not confirmed")) {
                        setStatus("Confirma tu correo antes de iniciar sesion.");
                    } else {
                        setStatus("Error: " + message);
                    }
                } finally {
                    submitBtn.disabled = false;
                }
            });

            googleBtn.addEventListener("click", async () => {
                const client = await getClient();
                if (!client?.signInWithGoogle) {
                    setStatus("Google no esta disponible todavia.");
                    return;
                }
                setStatus("Abriendo Google...");
                try {
                    await client.signInWithGoogle();
                } catch (error) {
                    setStatus("No se pudo iniciar con Google: " + (error?.message || ""));
                }
            });

            logoutBtn.addEventListener("click", async () => {
                const client = await getClient();
                try {
                    if (client?.signOutGoogle) await client.signOutGoogle();
                } finally {
                    if (typeof window.refreshUserUi === "function") window.refreshUserUi();
                    setStatus("Sesion cerrada.");
                }
            });

            if (window.AppSupabaseReady) {
                window.AppSupabaseReady.then((client) => {
                    client?.onAuthChange?.((detail) => {
                        if (detail?.user) saveLocalUser(detail.user, detail.username);
                    });
                });
            }

            setMode("login");
        })();
    </script>
</body>
</html>
