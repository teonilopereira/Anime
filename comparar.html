<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Compará 2 items lado a lado: anime, manga o juegos.">
    <meta name="keywords" content="comparar, anime, manga, juegos, detalle">
    <meta name="robots" content="noindex,follow">
    <title>Comparar</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/destiny-navbar.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* ── Botón login en navbar ── */
        .nav-login-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 18px;
            min-height: 40px;
            border: 1.5px solid rgba(168, 85, 247, 0.7);
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(91, 33, 182, 0.35), rgba(168, 85, 247, 0.18));
            color: #e2d9f3;
            font-family: "Rajdhani", sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-decoration: none;
            white-space: nowrap;
            transition: all 0.22s ease;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.2);
            flex-shrink: 0;
        }
        .nav-login-btn:hover {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.55), rgba(168, 85, 247, 0.35));
            border-color: #c084fc;
            color: #fff;
            box-shadow: 0 0 22px rgba(168, 85, 247, 0.45);
            transform: translateY(-1px);
        }
        .nav-login-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1.5px solid rgba(192, 132, 252, 0.7);
            object-fit: cover;
            background: linear-gradient(145deg, #1c1032, #7c3aed);
            display: block;
            flex-shrink: 0;
        }
        .nav-login-icon {
            width: 18px;
            height: 18px;
            opacity: 0.9;
        }
        /* ── Círculo invitado (modo sin sesión) ── */
        .nav-guest-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1.5px dashed rgba(148, 163, 184, 0.6);
            background: rgba(30, 20, 50, 0.6);
            color: rgba(148, 163, 184, 0.85);
            font-family: "Rajdhani", sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: border-color 0.22s, color 0.22s;
        }
        .nav-login-btn:hover .nav-guest-avatar {
            border-color: rgba(192, 132, 252, 0.7);
            color: #c084fc;
        }
    </style>
</head>
<body>
    <nav class="navbar destiny-navbar">
        <a class="nav-brand" href="index.html" aria-label="Anime Destiny">
            <span class="nav-brand-mark"><img src="images/Logo.png" alt="Anime Destiny logo" aria-hidden="true"></span>
            <span class="nav-brand-copy">
                <span class="nav-brand-anime">Anime</span>
                <span class="nav-brand-destiny">Destiny</span>
                <span class="nav-brand-jp">&gt; アニメの運命 &lt;</span>
            </span>
        </a>
        <div class="nav-links" aria-label="Navegación principal">
            <a href="anime.html" class="nav-btn"><span class="nav-icon" aria-hidden="true">🎬</span><span>Anime</span></a>
            <a href="manga.html" class="nav-btn"><span class="nav-icon" aria-hidden="true">📚</span><span>Manga</span></a>
            <a href="novelas.html" class="nav-btn"><span class="nav-icon" aria-hidden="true">📖</span><span>Novelas</span></a>
            <a href="mis-listas.html" class="nav-btn"><span class="nav-icon" aria-hidden="true">💖</span><span>Mis Listas</span></a>
        </div>
        <div class="nav-actions">
            <!-- Botón login / avatar -->
            <a id="nav-login-btn" href="Login.html" class="nav-login-btn" aria-label="Iniciar sesión">
                <img id="nav-login-avatar" class="nav-login-avatar" src="" alt="" aria-hidden="true"
                     style="display:none"
                     onerror="this.style.display='none'; document.getElementById('nav-login-icon').style.display='block'">
                <svg id="nav-login-icon" class="nav-login-icon" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
                <span id="nav-guest-avatar" class="nav-guest-avatar" aria-hidden="true">G</span>
                <span id="nav-login-label">Ingresar</span>
            </a>
        </div>
    </nav>

    <header class="page-header">
        <h1 class="page-title">COMPARAR</h1>
        <p class="page-subtitle">Elegí 2 items para verlos lado a lado.</p>
    </header>

    <main class="compare-page">
        <div class="compare-controls" role="form" aria-label="Seleccionar items">
            <div class="compare-picker">
                <label class="compare-label" for="cat1">Categoría 1</label>
                <select id="cat1" class="compare-select">
                    <option value="anime">Anime</option>
                    <option value="manga">Manga</option>
                    <option value="juegos">Juegos</option>
                </select>
                <label class="compare-label" for="id1">Item 1</label>
                <select id="id1" class="compare-select"></select>
            </div>

            <div class="compare-picker">
                <label class="compare-label" for="cat2">Categoría 2</label>
                <select id="cat2" class="compare-select">
                    <option value="anime">Anime</option>
                    <option value="manga">Manga</option>
                    <option value="juegos">Juegos</option>
                </select>
                <label class="compare-label" for="id2">Item 2</label>
                <select id="id2" class="compare-select"></select>
            </div>

            <button class="compare-btn" id="doCompare" type="button">Comparar</button>
        </div>

        <section class="compare-grid" aria-label="Resultado comparación">
            <div class="compare-card" id="compareA"></div>
            <div class="compare-card" id="compareB"></div>
        </section>
    </main>

    <footer class="app-footer">
        <div class="app-footer-inner">
            <div class="app-footer-col">
                <div class="app-footer-title">Tip</div>
                <p class="app-footer-text">Podés comparar títulos de distintas categorías.</p>
            </div>
            <div class="app-footer-col">
                <div class="app-footer-title">Detalle</div>
                <p class="app-footer-text">Desde la comparación podés abrir el detalle de cada uno.</p>
            </div>
            <div class="app-footer-col">
                <div class="app-footer-title">Redes</div>
                <div class="app-footer-social">
                    <a class="app-footer-icon" href="#" aria-label="X">𝕏</a>
                    <a class="app-footer-icon" href="#" aria-label="Instagram">IG</a>
                    <a class="app-footer-icon" href="#" aria-label="YouTube">YT</a>
                </div>
            </div>
        </div>
        <div class="app-footer-bottom">© 2026 Anime Destiny</div>
    </footer>
    <script src="js/core/config.js" defer></script>
    <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
      }
    }
    </script>
    <script type="module" src="api/supabase-config.js"></script>
    <script src="js/core/user-store.js" defer></script>
    <script src="js/core/supabase-sync.js" defer></script>
    <script src="js/core/auth.js" defer></script>
    <script src="js/controllers/AuthController.js" defer></script>
    <script src="js/controllers/UserController.js" defer></script>
    <script src="js/core/storage.js" defer></script>
    <script src="js/security/sanitizer.js" defer></script>
    <script src="js/security/validator.js" defer></script>
    <script src="js/utils.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/datos.js" defer></script>
    <script src="js/catalog/cards.js" defer></script>
    <script src="js/catalog/search.js" defer></script>
    <script src="js/script.js" defer></script>
    <script src="js/comparar.js" defer></script>
    <script defer>
        // ── Botón login: actualizar según estado de sesión ──
        document.addEventListener('DOMContentLoaded', function () {
            function updateLoginBtn(user) {
                const btn    = document.getElementById('nav-login-btn');
                const avatar = document.getElementById('nav-login-avatar');
                const icon   = document.getElementById('nav-login-icon');
                const label  = document.getElementById('nav-login-label');
                const guest  = document.getElementById('nav-guest-avatar');
                if (!btn) return;

                if (user) {
                    const name = user.user_metadata?.username
                        || user.user_metadata?.name
                        || user.user_metadata?.full_name
                        || (user.email ? user.email.split('@')[0] : '')
                        || 'Usuario';
                    const photoUrl = user.user_metadata?.avatar_url
                        || user.user_metadata?.picture
                        || '';

                    label.textContent = name;
                    btn.href = 'usuario.html';
                    btn.setAttribute('aria-label', 'Ver perfil de ' + name);
                    if (guest) guest.style.display = 'none';

                    if (photoUrl) {
                        avatar.src = photoUrl;
                        avatar.alt = name;
                        avatar.style.display = 'block';
                        icon.style.display   = 'none';
                    } else {
                        avatar.style.display = 'none';
                        icon.style.display   = 'block';
                    }
                } else {
                    label.textContent = 'Ingresar';
                    btn.href = 'Login.html';
                    btn.setAttribute('aria-label', 'Iniciar sesión');
                    avatar.style.display = 'none';
                    icon.style.display   = 'none';
                    if (guest) guest.style.display = 'flex';
                }
            }

            function tryGetUser(retries) {
                if (window.AppSupabase?.getCurrentUser) {
                    window.AppSupabase.getCurrentUser().then(updateLoginBtn);
                } else if (retries > 0) {
                    setTimeout(function () { tryGetUser(retries - 1); }, 300);
                }
            }
            tryGetUser(12);

            window.addEventListener('supabase-auth-changed', function () {
                if (window.AppSupabase?.getCurrentUser) {
                    window.AppSupabase.getCurrentUser().then(updateLoginBtn);
                }
            });
        });
    </script>
</body>
</html>
