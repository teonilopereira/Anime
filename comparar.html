<body data-page="comparar">
    <nav class="destiny-navbar">
        <div id="nav-brand-container"></div>
        <div id="nav-links-container"></div>
        <div class="nav-actions">
            <div id="nav-login-container"></div>
        </div>
    </nav>

    <header class="page-header">
        <h1 class="page-title" data-i18n="compare.titulo">COMPARAR</h1>
        <p class="page-subtitle" data-i18n="compare.desc">Elegí 2 items para verlos lado a lado.</p>
    </header>

    <main class="compare-page" id="main-content">
        <div class="compare-controls" role="form" aria-label="Elegir títulos a comparar">
            <div class="compare-picker">
                <div class="cmp-field cmp-field--cat">
                    <label class="compare-label" for="cat1">Catálogo</label>
                    <select id="cat1" class="compare-select">
                        <option value="anime">Anime</option>
                        <option value="manga">Manga</option>
                        <option value="novelas">Novelas</option>
                    </select>
                </div>
                <div class="cmp-field cmp-field--search">
                    <label class="compare-label" for="search1">Primer título</label>
                    <div class="cmp-search-wrap">
                        <span class="cmp-search-icon"><i data-lucide="search"></i></span>
                        <input id="search1" class="cmp-search-input" type="search" placeholder="Buscá un título..." autocomplete="off">
                        <div class="cmp-suggestions" id="sug1"></div>
                    </div>
                </div>
            </div>

            <div class="compare-vs" aria-hidden="true">VS</div>

            <div class="compare-picker">
                <div class="cmp-field cmp-field--cat">
                    <label class="compare-label" for="cat2">Catálogo</label>
                    <select id="cat2" class="compare-select">
                        <option value="anime">Anime</option>
                        <option value="manga">Manga</option>
                        <option value="novelas">Novelas</option>
                    </select>
                </div>
                <div class="cmp-field cmp-field--search">
                    <label class="compare-label" for="search2">Segundo título</label>
                    <div class="cmp-search-wrap">
                        <span class="cmp-search-icon"><i data-lucide="search"></i></span>
                        <input id="search2" class="cmp-search-input" type="search" placeholder="Buscá un título..." autocomplete="off">
                        <div class="cmp-suggestions" id="sug2"></div>
                    </div>
                </div>
            </div>

            <button class="compare-btn" id="doCompare" type="button">Comparar</button>
        </div>

        <section class="compare-grid" aria-label="Resultado comparación">
            <div class="compare-card" id="compareA"></div>
            <div class="compare-card" id="compareB"></div>
        </section>
    </main>

    <div id="footer-container"></div>
    <script src="js/core/config.js?v=7d6a3aaa"></script>
    <script src="js/core/namespace.js?v=7d6a3aaa"></script>
    <script src="js/core/i18n.js?v=7d6a3aaa"></script>
    <script type="module" src="api/supabase-config.js?v=7d6a3aaa" async></script>
    <script src="js/core-bundle.min.js?v=7d6a3aaa" defer></script>
    <script src="js/core/mangadex-api.js?v=7d6a3aaa" defer></script>
    <script src="js/pages/script.js?v=7d6a3aaa" defer></script>
    <script src="js/pages/comparar.js?v=7d6a3aaa" defer></script>
</body>
</html>
