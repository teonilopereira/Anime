<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://llytokoztnjuczuppzgs.supabase.co https://graphql.anilist.co https://api.mangadex.org https://api.mymemory.translated.net wss://llytokoztnjuczuppzgs.supabase.co; font-src 'self' https://fonts.gstatic.com data:; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none';">
    <meta name="description" content="Explorá mangas, marcá volúmenes leídos y guardá tu progreso.">
    <meta name="keywords" content="manga, catálogo, volúmenes, visto, me gusta, seinen, shounen">
    <meta name="robots" content="index,follow">
    <meta property="og:title" content="Anime Destiny | Manga">
    <meta property="og:description" content="Explorá mangas, marcá volúmenes leídos y guardá tu progreso.">
    <meta name="twitter:title" content="Anime Destiny | Manga">
    <meta name="twitter:description" content="Explorá mangas, marcá volúmenes leídos y guardá tu progreso.">
    <title>Anime Destiny | Manga</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="images/icon-192.png">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <meta name="theme-color" content="#bc13fe">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://animedestiny.netlify.app/manga.html">
    <meta property="og:site_name" content="Anime Destiny">
    <meta property="og:image" content="https://animedestiny.netlify.app/images/icon-512.png">
    <meta name="twitter:card" content="summary">

        <link rel="stylesheet" href="css/bundle.min.css?v=43fdea0a">

    <link rel="stylesheet" href="css/advanced-filter.css?v=43fdea0a">
        <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/lucide/dist/umd/lucide.min.js"></script>
</head>
<body data-page="manga">
    <nav class="destiny-navbar">
        <div id="nav-brand-container"></div>
        <div id="nav-links-container"></div>
        <div class="nav-actions">
            <div id="nav-login-container"></div>
        </div>
    </nav>

    <header class="page-header">
        <h1 class="page-title" data-i18n="catalog.title.manga">CATÁLOGO DE MANGA</h1>
        <p class="page-subtitle" data-i18n="catalog.subtitle.manga">Explorá, descubrí y guardá tus mangas favoritos.</p>
        
        <div class="catalog-browse-tabs" id="browseTabs" role="tablist" aria-label="Modo de descubrimiento">
            <button class="browse-tab" type="button" data-browse="">Populares</button>
            <button class="browse-tab" type="button" data-browse="tendencias">Tendencias</button>
            <button class="browse-tab" type="button" data-browse="puntuados">Mejor puntuados</button>
        </div>

        <div class="catalog-search-filter-container">
            <div class="catalog-search-wrap">
                <div class="catalog-search-inner">
                    <span class="catalog-search-icon"><i data-lucide="search"></i></span>
                    <input id="catalogSearch" class="catalog-search-input" type="search" placeholder="Buscar manga..." data-i18n="catalog.buscar.manga" data-i18n-attr="placeholder" autocomplete="off">
                </div>
                <button id="mainFilterToggle" type="button" class="advanced-filter-toggle" data-i18n="catalog.abrir_filtros" data-i18n-attr="aria-label" aria-label="Abrir filtros">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                </button>
            </div>
            
            <div class="advanced-filter-dropdown" id="filterDropdown" style="display: none;">
                <div class="filter-dropdown-inner">
                    <div class="filter-header-row">
                        <div class="filter-header-icon-wrap">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                        </div>
                        <div class="filter-header-content">
                            <div class="filter-header-row-inner">
                                <h2 data-i18n="catalog.filtros">FILTROS ADICIONALES</h2>
                                <button id="clearFiltersBtn" class="clear-filters-btn" data-i18n="catalog.limpiar">Limpiar Filtros</button>
                            </div>
                            
                            <label class="nsfw-row-label">
                                <div class="nsfw-checkbox">
                                    <input type="checkbox" id="nsfwToggle">
                                    <div class="nsfw-checkbox-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                                </div>
                                <div class="nsfw-text-block">
                                    <div class="nsfw-title" data-i18n="catalog.nsfw.titulo">Mostrar NSFW</div>
                                    <div class="nsfw-desc" data-i18n="catalog.nsfw.desc">Activa para mostrar contenido para adultos.</div>
                                </div>
                                <div class="filter-chevron"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg></div>
                            </label>
                        </div>
                    </div>

                    <div class="filter-section-divider">
                        <span class="fsd-line"></span>
                        <span class="fsd-dot"></span>
                        <span class="fsd-text" data-i18n="catalog.genero">GÉNERO</span>
                        <span class="fsd-dot"></span>
                        <span class="fsd-line"></span>
                    </div>

                    <div class="filter-genre-search">
                        <svg class="filter-genre-search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="search" id="filterGenreSearch" class="filter-genre-search-input" placeholder="Buscar género..." data-i18n="catalog.buscar_genero" data-i18n-attr="placeholder" autocomplete="off">
                    </div>

                    <div class="fancy-filter-genres" id="filterGenres"></div>

                    <button type="button" id="toggleGenresBtn" class="toggle-genres-btn" hidden>Ver todos ▼</button>
                </div>
            </div>
        </div>
    </header>

    <div class="catalog-layout">
        <div class="catalog-content">
            <section class="featured" id="featuredBanner" data-featured="manga"></section>
            <main class="gallery" id="main-content"></main>
            <div id="scroll-sentinel" class="scroll-sentinel"></div>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="js/core/config.js"></script>
    <script src="js/core/i18n.js"></script>
    <script src="js/core/namespace.js"></script>
    <script type="module" src="api/supabase-config.js" async></script>
    <script src="js/core-bundle.min.js?v=43fdea0a" defer></script>
    <script src="js/core/mangadex-api.js" defer></script>
    <script src="js/pages/script.js" defer></script>
</body>
</html>
