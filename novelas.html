    <link rel="apple-touch-icon" href="images/icon-192.png">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

</head>
<body data-page="novelas">
    <nav class="navbar destiny-navbar">
        <div id="nav-brand-container"></div>
        <div id="nav-links-container"></div>
        <div class="nav-actions">
            <div id="nav-login-container"></div>
        </div>
    </nav>

    <header class="page-header">
        <h1 class="page-title">CATÁLOGO DE NOVELAS</h1>
        <p class="page-subtitle">Explorá, descubrí y guardá tus novelas favoritas.</p>
        
        <div class="catalog-search-filter-container" style="display: flex; flex-direction: column; align-items: stretch; gap: 15px; max-width: 800px; margin: 0 auto;">
            <div class="catalog-search-wrap" style="width: 100%; display: flex; gap: 10px;">
                <div style="position:relative; flex:1;">
                    <span class="catalog-search-icon">🎬</span>
                    <input id="catalogSearch" class="catalog-search-input" type="search" placeholder="Buscar novelas..." autocomplete="off">
                </div>
                <button id="mainFilterToggle" type="button" class="advanced-filter-toggle" aria-label="Abrir filtros">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                </button>
            </div>
            
            <div class="advanced-filter-dropdown" id="filterDropdown" style="display: none;">
                <div class="filter-dropdown-inner">
                    <div class="filter-header-row">
                        <div class="filter-header-icon-wrap">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                        </div>
                        <div class="filter-header-content">
                            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                                <h2>FILTROS ADICIONALES</h2>
                                <button id="clearFiltersBtn" class="clear-filters-btn">Limpiar Filtros</button>
                            </div>
                            
                            <label class="nsfw-row-label">
                                <div class="nsfw-checkbox">
                                    <input type="checkbox" id="nsfwToggle">
                                    <div class="nsfw-checkbox-box"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                                </div>
                                <div class="nsfw-text-block">
                                    <div class="nsfw-title">Mostrar NSFW</div>
                                    <div class="nsfw-desc">Activa para mostrar contenido para adultos.</div>
                                </div>
                                <div style="margin-left: auto; color: rgba(255,255,255,0.4);"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg></div>
                            </label>
                        </div>
                    </div>

                    <div class="filter-section-divider">
                        <span class="fsd-line"></span>
                        <span class="fsd-dot"></span>
                        <span class="fsd-text">GÉNERO</span>
                        <span class="fsd-dot"></span>
                        <span class="fsd-line"></span>
                    </div>

                    <div class="fancy-filter-genres" id="filterGenres"></div>
                </div>
            </div>
        </div>
    </header>

    <div id="genreDrawer" class="genre-drawer"></div>

    <div class="catalog-layout">
        <div id="genreSidebar" class="genre-sidebar"></div>
        <div class="catalog-content" id="main-content">
            <main class="gallery" id="main-container"></main>
            <div id="scroll-sentinel" class="scroll-sentinel"></div>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="js/core/config.js"></script>
    <script src="js/core/namespace.js"></script>
    <script type="module" src="api/supabase-config.js" async></script>
    <script src="js/core-bundle.js" defer></script>
    <script src="js/core/mangadex-api.js" defer></script>
    <script src="js/pages/script.js" defer></script>
</body>
</html>
