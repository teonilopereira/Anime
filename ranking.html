    <style>
        /* ── Panel principal (mismo marco que el ranking de jugadores) ── */
        .trk-container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 24px;
            border-radius: var(--radius-lg, 16px);
            background: rgba(8, 6, 20, 0.72);
            border: 1px solid rgba(188, 19, 254, 0.18);
        }

        /* ── Cabecera ── */
        .trk-hero {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }
        .trk-hero-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 260px;
        }
        .trk-medalla {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: rgba(188, 19, 254, 0.12);
            border: 1px solid rgba(188, 19, 254, 0.35);
            box-shadow: 0 0 24px rgba(188, 19, 254, 0.25);
            flex-shrink: 0;
        }
        .trk-medalla svg { width: 34px; height: 34px; color: var(--neon-purple, #bc13fe); }
        .trk-title {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.9rem;
            color: var(--accent-cyan, #00f2ff);
            text-shadow: 0 0 14px rgba(0, 242, 255, 0.4);
        }
        .trk-subtitle {
            margin: 4px 0 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* ── Pestañas: un ranking por categoria ── */
        .trk-tabs {
            display: flex;
            gap: 6px;
            padding: 5px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .trk-tab {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 22px;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.82rem;
            transition: all .2s;
        }
        .trk-tab svg { width: 15px; height: 15px; }
        .trk-tab:hover { color: var(--text-main); }
        .trk-tab.is-active {
            background: linear-gradient(135deg, var(--neon-purple, #bc13fe), #7b2ff7);
            color: #fff;
            box-shadow: 0 0 16px rgba(188, 19, 254, 0.45);
        }

        /* ── Filas ── */
        .trk-lista {
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 14px;
            overflow: hidden;
        }
        .trk-fila {
            display: grid;
            grid-template-columns: 56px 46px minmax(0, 1fr) 76px;
            gap: 14px;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.015);
            color: inherit;
            text-decoration: none;
            transition: background .18s;
        }
        .trk-fila:last-child { border-bottom: 0; }
        .trk-fila:hover { background: rgba(188, 19, 254, 0.10); }
        /* El podio se distingue con un borde lateral dorado/plata/bronce. */
        .trk-fila--podio { background: rgba(255, 255, 255, 0.035); }
        .trk-fila--podio:nth-child(1) { border-left: 2px solid #ffd54a; }
        .trk-fila--podio:nth-child(2) { border-left: 2px solid #cfd8e3; }
        .trk-fila--podio:nth-child(3) { border-left: 2px solid #d68a45; }
        .trk-fila--skeleton { pointer-events: none; }

        .trk-pos {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.05rem;
            color: var(--text-muted);
        }
        .trk-pos svg { width: 16px; height: 16px; }
        .trk-pos--1 { color: #ffd54a; }
        .trk-pos--2 { color: #cfd8e3; }
        .trk-pos--3 { color: #d68a45; }

        .trk-poster {
            display: block;
            width: 46px;
            height: 66px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.10);
        }
        .trk-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .trk-info { min-width: 0; }
        .trk-titulo {
            display: block;
            font-weight: 600;
            font-size: 1.02rem;
            line-height: 1.25;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .trk-fila:hover .trk-titulo { color: var(--accent-cyan, #00f2ff); }
        .trk-meta {
            display: block;
            margin-top: 3px;
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .trk-generos {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 6px;
        }
        .trk-genero {
            padding: 1px 8px;
            border-radius: 999px;
            background: rgba(188, 19, 254, 0.12);
            border: 1px solid rgba(188, 19, 254, 0.28);
            color: var(--neon-purple, #bc13fe);
            font-size: 0.7rem;
            line-height: 1.5;
            white-space: nowrap;
        }

        .trk-score {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-self: end;
            min-width: 62px;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.10);
        }
        .trk-score-num {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            line-height: 1.1;
            color: var(--accent-cyan, #00f2ff);
        }
        .trk-score-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }
        .trk-score--vacio .trk-score-num { color: var(--text-muted); }

        /* ── Pie: total + cargar mas ── */
        .trk-pie {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 14px;
            margin-top: 18px;
        }
        .trk-total {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
            font-family: 'Rajdhani', sans-serif;
        }
        .trk-total svg { width: 15px; height: 15px; }
        .trk-btn {
            padding: 9px 26px;
            border: 1px solid rgba(188, 19, 254, 0.4);
            border-radius: 999px;
            background: rgba(188, 19, 254, 0.12);
            color: var(--text-main);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            transition: all .2s;
        }
        .trk-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--neon-purple, #bc13fe), #7b2ff7);
            box-shadow: 0 0 16px rgba(188, 19, 254, 0.45);
        }
        .trk-btn:disabled { opacity: .5; cursor: not-allowed; }

        .trk-estado {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 60px 20px;
            color: var(--text-muted);
            text-align: center;
        }
        .trk-estado svg { width: 34px; height: 34px; color: var(--neon-purple, #bc13fe); }
        .trk-estado p { margin: 0; }

        /* Puente al otro ranking (el de jugadores), que no tiene item propio
           en la barra de navegacion. */
        .trk-otro-ranking {
            display: flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
            margin: -6px 0 18px;
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            transition: all .2s;
        }
        .trk-otro-ranking svg { width: 15px; height: 15px; }
        .trk-otro-ranking:hover {
            border-color: rgba(0, 242, 255, 0.4);
            color: var(--accent-cyan, #00f2ff);
        }

        /* ── Responsive ──────────────────────────────────────────────
           Se van cayendo, por orden de prescindibilidad: los generos, el
           ancho de las columnas y por ultimo la etiqueta SCORE. El poster
           y la puntuacion sobreviven en todos los anchos: son lo que hace
           reconocible la fila. */
        @media (max-width: 860px) {
            .trk-hero { gap: 16px; }
            .trk-fila { grid-template-columns: 46px 42px minmax(0, 1fr) 68px; gap: 12px; }
            .trk-poster { width: 42px; height: 60px; }
        }

        @media (max-width: 640px) {
            .trk-container { padding: 16px; margin: 18px auto; }
            /* En una fila el titulo y las tabs no entran sin apretarse: las
               tabs bajan y se reparten el ancho. */
            .trk-hero { flex-direction: column; align-items: stretch; gap: 14px; }
            .trk-hero-left { min-width: 0; }
            .trk-tabs { justify-content: center; }
            .trk-tab { flex: 1; justify-content: center; padding: 9px 10px; }
            .trk-title { font-size: 1.5rem; }
            .trk-subtitle { font-size: 0.88rem; }

            .trk-fila { grid-template-columns: 36px 40px minmax(0, 1fr) 60px; gap: 10px; padding: 10px 12px; }
            .trk-poster { width: 40px; height: 57px; }
            .trk-titulo { font-size: 0.95rem; }
            .trk-generos { display: none; }
            .trk-score { min-width: 0; padding: 7px 8px; }
            .trk-score-num { font-size: 1.05rem; }
        }

        @media (max-width: 380px) {
            .trk-container { padding: 10px; }
            .trk-fila { grid-template-columns: 28px 34px minmax(0, 1fr) 46px; gap: 8px; padding: 9px 8px; }
            .trk-poster { width: 34px; height: 48px; }
            .trk-pos { font-size: 0.9rem; }
            .trk-pos svg { width: 13px; height: 13px; }
            .trk-titulo { font-size: 0.88rem; }
            .trk-tab { font-size: 0.7rem; gap: 5px; }
            .trk-score-label { display: none; }
            .trk-score-num { font-size: 0.95rem; }
        }
    </style>
