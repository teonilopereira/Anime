    <style>
        .ranking-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .ranking-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            justify-content: center;
        }
        .ranking-tab {
            padding: 10px 28px;
            border: 1px solid var(--nav-accent);
            background: transparent;
            color: var(--nav-accent);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            border-radius: 6px;
            transition: all .2s;
        }
        .ranking-tab.is-active {
            background: var(--nav-accent);
            color: #000;
        }
        .ranking-tab:disabled {
            opacity: .4;
            cursor: not-allowed;
        }
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
        }
        .ranking-table th {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid rgba(255,255,255,.1);
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--text-muted);
        }
        .ranking-table td {
            padding: 14px 8px;
            border-bottom: 1px solid rgba(255,255,255,.05);
        }
        .ranking-rank {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--nav-accent);
            width: 50px;
        }
        .ranking-name {
            font-weight: 500;
        }
        .ranking-level {
            font-family: 'Orbitron', sans-serif;
            color: var(--cyan);
        }
        .ranking-exp {
            font-family: 'Orbitron', sans-serif;
            color: var(--text-muted);
            text-align: right;
        }
        .ranking-loading {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
            font-size: 16px;
        }
        .ranking-empty {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
        }
        .ranking-loaded {
            animation: fadeIn .3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ranking-filter-bar {
            margin-bottom: 16px;
        }
        .ranking-filter-input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0,0,0,.3);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 6px;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color .2s;
        }
        .ranking-filter-input:focus {
            border-color: var(--nav-accent);
        }
        .ranking-avatar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--nav-accent);
            color: #000;
            font-weight: 700;
            font-size: 12px;
            font-family: 'Orbitron', sans-serif;
            margin-right: 8px;
            vertical-align: middle;
            overflow: hidden;
            flex-shrink: 0;
        }
        .ranking-avatar-img {
            padding: 0;
            background: transparent;
        }
        .ranking-avatar-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .ranking-badge {
            display: inline-block;
            margin-left: 6px;
            padding: 1px 8px;
            border-radius: 10px;
            background: var(--cyan);
            color: #000;
            font-size: 10px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            vertical-align: middle;
        }
        .ranking-row-own {
            background: rgba(var(--nav-accent-rgb, 180, 100, 255), .08);
        }
        .ranking-row-own td {
            border-bottom-color: rgba(var(--nav-accent-rgb, 180, 100, 255), .15);
        }
        .ranking-footer {
            margin-top: 16px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            font-family: 'Rajdhani', sans-serif;
        }
        @media (max-width: 600px) {
            .ranking-table th, .ranking-table td {
                padding: 10px 6px;
                font-size: 13px;
            }
            .ranking-rank { font-size: 15px; width: 36px; }
            .ranking-avatar { width: 26px; height: 26px; font-size: 10px; margin-right: 4px; }
        }
        @media (max-width: 480px) {
            .ranking-container { padding: 0 12px; margin: 20px auto; }
            .ranking-tabs { gap: 6px; }
            .ranking-tab { padding: 6px 12px; font-size: 11px; }
            .ranking-table th, .ranking-table td { padding: 6px 4px; font-size: 11px; }
            .ranking-rank { font-size: 12px; width: 24px; }
            .ranking-avatar { width: 22px; height: 22px; font-size: 8px; margin-right: 2px; }
            .ranking-level { font-size: 11px; }
            .ranking-exp { font-size: 11px; }
        }
        @media (max-width: 400px) {
            .ranking-container { padding: 0 8px; margin: 14px auto; }
            .ranking-tabs { flex-wrap: wrap; gap: 4px; }
            .ranking-tab { padding: 5px 8px; font-size: 10px; flex: 1; min-width: 0; }
            .ranking-table th, .ranking-table td { padding: 4px 2px; font-size: 10px; }
            .ranking-rank { font-size: 10px; width: 20px; }
            .ranking-name { font-size: 10px; }
            .ranking-filter-input { padding: 6px 10px; font-size: 13px; }
        }
    </style>
