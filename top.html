    <style>
        /* ── Ranking: panel principal ── */
        .ranking-container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 24px;
            border-radius: var(--radius-lg, 16px);
            background: rgba(8, 6, 20, 0.72);
            border: 1px solid rgba(188, 19, 254, 0.18);
        }

        /* ── Cabecera: trofeo + titulo a la izquierda, tabs al centro-derecha ── */
        .rank-hero {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }
        .rank-hero-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
            min-width: 260px;
        }
        .rank-trophy {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: rgba(188, 19, 254, 0.12);
            border: 1px solid rgba(188, 19, 254, 0.35);
            box-shadow: 0 0 24px rgba(188, 19, 254, 0.25);
            flex-shrink: 0;
        }
        .rank-trophy svg {
            width: 34px;
            height: 34px;
            color: var(--neon-purple, #bc13fe);
        }
        .rank-title {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.9rem;
            color: var(--accent-cyan, #00f2ff);
            text-shadow: 0 0 14px rgba(0, 242, 255, 0.4);
        }
        .rank-subtitle {
            margin: 4px 0 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .ranking-tabs {
            display: flex;
            gap: 6px;
            padding: 5px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .ranking-tab {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 26px;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.82rem;
            transition: all .2s;
        }
        .ranking-tab svg { width: 15px; height: 15px; }
        .ranking-tab.is-active {
            background: linear-gradient(135deg, var(--neon-purple, #bc13fe), #7b2ff7);
            color: #fff;
            box-shadow: 0 0 16px rgba(188, 19, 254, 0.45);
        }
        .ranking-tab:disabled { opacity: .4; cursor: not-allowed; }

        /* Puente al ranking de titulos, que es el que tiene el item en la barra. */
        .rank-otro-ranking {
            display: flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
            margin: -6px 0 18px;
            padding: 8px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            text-decoration: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            transition: all .2s;
        }
        .rank-otro-ranking svg { width: 15px; height: 15px; }
        .rank-otro-ranking:hover {
            border-color: rgba(0, 242, 255, 0.4);
            color: var(--accent-cyan, #00f2ff);
        }

        /* ── Buscador ── */
        .ranking-filter-bar {
            position: relative;
            margin-bottom: 18px;
        }
        .ranking-filter-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            color: var(--text-faint, rgba(255,255,255,.35));
            pointer-events: none;
        }
        .ranking-filter-icon svg { width: 17px; height: 17px; }
        .ranking-filter-input {
            width: 100%;
            padding: 13px 16px 13px 44px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 14px;
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color .2s;
        }
        .ranking-filter-input:focus { border-color: var(--accent-cyan, #00f2ff); }

        /* ── Tabla como filas-card ── */
        .rank-list {
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 14px;
            overflow: hidden;
        }
        .rank-head,
        .rank-row {
            display: grid;
            grid-template-columns: 64px minmax(0, 1.3fr) 150px minmax(150px, 1fr) 96px;
            gap: 14px;
            align-items: center;
            padding: 12px 16px;
        }
        .rank-head {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.68rem;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .rank-head .rank-h-exp { text-align: right; color: var(--accent-cyan, #00f2ff); }
        .rank-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.015);
        }
        .rank-row:last-child { border-bottom: 0; }
        .rank-row-own {
            background: linear-gradient(90deg, rgba(188, 19, 254, 0.20), rgba(188, 19, 254, 0.05));
            border-left: 2px solid var(--neon-purple, #bc13fe);
        }

        /* Posicion: escudo con corona/medalla para el podio */
        .rank-pos {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.05rem;
            color: var(--text-muted);
        }
        .rank-pos svg { width: 16px; height: 16px; }
        .rank-pos--1 { color: #ffd54a; }
        .rank-pos--2 { color: #cfd8e3; }
        .rank-pos--3 { color: #d68a45; }

        /* Jugador: avatar + nombre + apodo */
        .rank-player {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        .ranking-avatar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--nav-accent, #00f2ff);
            color: #000;
            font-weight: 700;
            font-size: 14px;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.12);
        }
        .ranking-avatar-img { padding: 0; background: transparent; }
        .ranking-avatar-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .rank-player-info { min-width: 0; }
        .rank-player-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1.02rem;
            line-height: 1.25;
            min-width: 0;
        }
        /* La chapa "TÚ" nunca se parte. El nombre cede ancho tres veces mas
           despacio que el apodo, asi el apodo se recorta primero. */
        .rank-player-name > .rank-player-nick {
            flex: 0 1 auto;
            min-width: 5ch;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rank-player-name > .rank-player-apodo { flex-shrink: 3; }
        .ranking-badge {
            padding: 2px 9px;
            border-radius: 999px;
            background: rgba(0, 242, 255, 0.15);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: var(--accent-cyan, #00f2ff);
            font-size: 10px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            flex-shrink: 0;
        }
        /* El apodo va al lado del nombre. Es el elemento secundario, asi que
           es el primero en ceder ancho: se recorta con ellipsis (el texto
           completo queda en el title) antes de que se recorte el nombre. */
        .rank-player-apodo {
            flex: 0 1 auto;
            min-width: 3ch;
            font-size: 0.78rem;
            line-height: 1.3;
            color: var(--neon-purple, #bc13fe);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* Solo aparece cuando la columna NIVEL se cae por falta de ancho. */
        .rank-sub-level {
            display: none;
            flex-shrink: 0;
            padding: 1px 8px;
            border-radius: 999px;
            background: rgba(188, 19, 254, 0.14);
            border: 1px solid rgba(188, 19, 254, 0.35);
            color: var(--neon-purple, #bc13fe);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.62rem;
            letter-spacing: 0.04em;
        }

        /* Nivel: escudito + numero */
        .rank-level {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rank-level-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(188, 19, 254, 0.14);
            border: 1px solid rgba(188, 19, 254, 0.4);
            flex-shrink: 0;
        }
        .rank-level-icon svg { width: 19px; height: 19px; color: var(--neon-purple, #bc13fe); }
        .rank-level-label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }
        .rank-level-num {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            line-height: 1.1;
            color: #fff;
        }

        /* Progreso hacia el proximo nivel */
        .rank-progress-track {
            height: 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }
        .rank-progress-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, var(--neon-purple, #bc13fe), #7b2ff7);
        }
        .rank-progress-text {
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* EXP total */
        .rank-exp {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-self: end;
            min-width: 76px;
            padding: 8px 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.10);
        }
        .rank-row-own .rank-exp { border-color: rgba(188, 19, 254, 0.5); }
        .rank-exp-num {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            line-height: 1.1;
            color: var(--accent-cyan, #00f2ff);
        }
        .rank-exp-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .ranking-loading { text-align: center; padding: 60px 0; color: var(--text-muted); font-size: 16px; }
        .ranking-empty { text-align: center; padding: 60px 0; color: var(--text-muted); }
        .ranking-loaded { animation: fadeIn .3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ranking-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 18px;
            color: var(--text-muted);
            font-size: 13px;
            font-family: 'Rajdhani', sans-serif;
        }
        .ranking-footer svg { width: 15px; height: 15px; }

        /* ── Responsive ──────────────────────────────────────────────
           Las columnas se caen por orden de prescindibilidad: primero la
           barra de progreso, despues la columna NIVEL (que reaparece como
           chip en la segunda linea del jugador). El apodo sobrevive en
           todos los anchos: se recorta con ellipsis, no se oculta. */
        @media (max-width: 1024px) {
            .rank-head, .rank-row {
                grid-template-columns: 56px minmax(0, 1.2fr) 132px minmax(110px, 1fr) 90px;
                gap: 10px;
            }
            .rank-level-icon { width: 34px; height: 34px; }
            .rank-level-icon svg { width: 16px; height: 16px; }
        }

        @media (max-width: 860px) {
            .rank-hero { gap: 16px; }
            .rank-head, .rank-row { grid-template-columns: 52px minmax(0, 1fr) 124px 92px; }
            .rank-h-progress, .rank-progress { display: none; }
        }

        @media (max-width: 640px) {
            .ranking-container { padding: 16px; margin: 18px auto; }
            /* El trofeo + titulo pasan a ocupar el ancho y las tabs quedan
               debajo, centradas: en una fila no entraban sin apretarse. */
            .rank-hero { flex-direction: column; align-items: stretch; gap: 14px; }
            .rank-hero-left { min-width: 0; }
            .ranking-tabs { justify-content: center; }
            .ranking-tab { flex: 1; justify-content: center; }
            .rank-title { font-size: 1.5rem; }
            .rank-subtitle { font-size: 0.88rem; }

            .rank-head, .rank-row { grid-template-columns: 40px minmax(0, 1fr) 84px; gap: 10px; padding: 11px 12px; }
            .rank-h-level, .rank-level { display: none; }
            .rank-sub-level { display: inline-block; }
            /* Sin la columna NIVEL la celda es angosta: el nombre se queda con
               el renglon entero y el chip de nivel + el apodo bajan al de
               abajo (el chip va antes en el DOM para quedar a la izquierda). */
            .rank-player-name { flex-wrap: wrap; row-gap: 3px; }
            .rank-player-name > .rank-player-nick { flex: 1 0 100%; }

            .ranking-avatar { width: 40px; height: 40px; font-size: 12px; }
            .rank-player { gap: 10px; }
            .rank-player-name { font-size: 0.95rem; }
            .rank-pos { font-size: 0.95rem; }
            .rank-exp { min-width: 0; padding: 7px 8px; }
            .rank-exp-num { font-size: 1.05rem; }
        }

        /* Telefonos angostos: se va la etiqueta EXP y el apodo manda en la
           segunda linea, asi el nombre no se recorta a dos letras. */
        @media (max-width: 380px) {
            .ranking-container { padding: 10px; }
            .rank-head, .rank-row { grid-template-columns: 30px minmax(0, 1fr) 68px; gap: 8px; padding: 10px 8px; }
            .rank-pos svg { width: 13px; height: 13px; }
            .ranking-avatar { width: 34px; height: 34px; font-size: 11px; border-width: 1px; }
            .rank-player { gap: 8px; }
            .rank-player-name { font-size: 0.88rem; }
            /* Compartiendo renglon con el chip de nivel al apodo le quedaban
               ~65px: se lo manda a un renglon propio, con la celda entera. */
            .rank-player-apodo { flex: 1 0 100%; font-size: 0.72rem; }
            .rank-exp-num { font-size: 0.95rem; }
            .rank-exp-label { display: none; }
            .ranking-footer { font-size: 12px; text-align: center; flex-wrap: wrap; }
        }
    </style>
